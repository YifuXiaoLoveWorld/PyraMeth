[env]
# PyTorch conda package is built with _GLIBCXX_USE_CXX11_ABI=0.
# torch-sys must match this ABI or symbols in libc10.so / libtorch.so
# will not be found at link time.
LIBTORCH_CXX11_ABI = "0"
# Tell torch-sys to compile libtch.a with -DWITH_CUDA and link libtorch_cuda.
# Must match the cuda-runtime version in the deepsignalx conda env (12.1.x).
TORCH_CUDA_VERSION = "12.1"

